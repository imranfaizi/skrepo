{% extends 'base.html' %}

{% block page_title %}Add Expense Category{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold mb-0"><i class="bi bi-tags me-2 text-primary"></i>Add Expense Category</h5>
    <a href="{% url 'expense_category_list' %}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>

<div class="content-card" style="max-width: 500px;">
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label fw-semibold">Category Name *</label>
                <input type="text" name="name" class="form-control"
                       placeholder="e.g. Hospitality, Rent, Salary, Utilities" required>
                <div class="form-text">
                    Examples: Hospitality, Rent, Electricity, Tailor Salary, Packaging, Transport
                </div>
            </div>
            <button type="submit" class="btn-primary-custom btn w-100">
                <i class="bi bi-check-lg me-1"></i> Save Category
            </button>
        </form>
    </div>
</div>

{% endblock %}
