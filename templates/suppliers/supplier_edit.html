{% extends 'base.html' %}

{% block page_title %}Edit Supplier{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold mb-0"><i class="bi bi-pencil me-2 text-primary"></i>Edit Supplier</h5>
    <a href="{% url 'supplier_list' %}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>

<div class="content-card">
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Supplier Name *</label>
                    <input type="text" name="name" class="form-control" value="{{ supplier.name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Business Name</label>
                    <input type="text" name="business_name" class="form-control" value="{{ supplier.business_name|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Phone Number</label>
                    <input type="text" name="phone" class="form-control" value="{{ supplier.phone|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ supplier.email|default:'' }}">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Address</label>
                    <textarea name="address" class="form-control" rows="3">{{ supplier.address|default:'' }}</textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Status</label>
                    <div class="form-check mt-2">
                        <input type="checkbox" name="is_active" class="form-check-input" id="is_active"
                            {% if supplier.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Active</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold text-danger">
                        <i class="bi bi-lock-fill me-1"></i> Admin Password *
                    </label>
                    <input type="password" name="edit_password" class="form-control"
                           placeholder="Enter admin password to save changes" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn-primary-custom btn">
                        <i class="bi bi-check-lg me-1"></i> Update Supplier
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock %}
