{% extends 'base.html' %}

{% block page_title %}Add Supplier{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold mb-0"><i class="bi bi-person-lines-fill me-2 text-primary"></i>Add Supplier</h5>
    <a href="{% url 'supplier_list' %}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>

<div class="content-card">
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Supplier Name *</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Ahmed Fabrics" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Business Name</label>
                    <input type="text" name="business_name" class="form-control" placeholder="e.g. Ahmed & Sons">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Phone Number</label>
                    <input type="text" name="phone" class="form-control" placeholder="e.g. 0300-1234567">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="e.g. ahmed@email.com">
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Address</label>
                    <textarea name="address" class="form-control" rows="3" placeholder="Supplier address..."></textarea>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn-primary-custom btn">
                        <i class="bi bi-check-lg me-1"></i> Save Supplier
                    </button>
                </div>

            </div>
        </form>
    </div>
</div>

{% endblock %}
