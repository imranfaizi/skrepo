{% extends 'base.html' %}

{% block page_title %}Edit Customer{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold mb-0"><i class="bi bi-pencil me-2 text-primary"></i>Edit Customer</h5>
    <a href="{% url 'customer_list' %}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>

<div class="content-card" style="max-width: 600px;">
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Customer Name *</label>
                    <input type="text" name="name" class="form-control"
                           value="{{ customer.name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Phone Number</label>
                    <input type="text" name="phone" class="form-control"
                           value="{{ customer.phone|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control"
                           value="{{ customer.email|default:'' }}">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Address</label>
                    <textarea name="address" class="form-control" rows="3">{{ customer.address|default:'' }}</textarea>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold text-danger">
                        <i class="bi bi-lock-fill me-1"></i> Admin Password *
                    </label>
                    <input type="password" name="edit_password" class="form-control"
                           placeholder="Enter admin password to save changes" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn-primary-custom btn">
                        <i class="bi bi-check-lg me-1"></i> Update Customer
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock %}
