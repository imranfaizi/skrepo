{% extends 'base.html' %}

{% block page_title %}Add Customer{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold mb-0"><i class="bi bi-person-plus me-2 text-primary"></i>Add Customer</h5>
    <a href="{% url 'customer_list' %}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>

<div class="content-card" style="max-width: 600px;">
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Customer Name *</label>
                    <input type="text" name="name" class="form-control"
                           placeholder="e.g. Sara Ahmed" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Phone Number</label>
                    <input type="text" name="phone" class="form-control"
                           placeholder="e.g. 0300-1234567">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="e.g. sara@email.com">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Address</label>
                    <textarea name="address" class="form-control" rows="3"
                              placeholder="Customer address..."></textarea>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn-primary-custom btn">
                        <i class="bi bi-check-lg me-1"></i> Save Customer
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock %}
